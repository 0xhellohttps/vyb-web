<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 0 96px;
    color: #1d1d1f;
  }
  .logo {
    width: 132px; height: 132px;
    background: #0071e3;
    border-radius: 30px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 44px;
    box-shadow: 0 12px 40px rgba(0,113,227,0.28);
  }
  .logo span { color: #fff; font-size: 92px; font-weight: 700; line-height: 1; }
  h1 { font-size: 76px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.05; max-width: 900px; }
  p { margin-top: 28px; font-size: 34px; font-weight: 400; color: #6e6e73; max-width: 880px; line-height: 1.3; }
  .brand { position: absolute; top: 64px; right: 96px; font-size: 30px; font-weight: 600; color: #0071e3; letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="brand">VYB</div>
  <div class="logo"><span>v</span></div>
  <h1>Run the tour from the group chat.</h1>
  <p>An AI Concierge that books shows, syncs schedules, and settles money — right in your iMessage thread.</p>
</body>
</html>
