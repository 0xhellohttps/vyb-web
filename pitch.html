document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

em\"><span class=\"az-badge\">6<\u002Fspan><b>Multi-entity accounting<\u002Fb><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"az-diagram\">\n          <svg viewBox=\"0 0 620 620\" aria-hidden=\"true\">\n            <circle cx=\"310\" cy=\"310\" r=\"220\" fill=\"none\" stroke=\"rgba(0,0,0,0.1)\" stroke-width=\"1.5\"><\u002Fcircle>\n            <circle cx=\"310\" cy=\"310\" r=\"220\" fill=\"none\" stroke=\"#0071e3\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-dasharray=\"80 1300\" opacity=\"0.95\"><\u002Fcircle>\n            <line x1=\"310\" y1=\"310\" x2=\"310\" y2=\"90\" stroke=\"rgba(0,0,0,0.08)\" stroke-width=\"1.5\" stroke-dasharray=\"4 6\"><\u002Fline>\n            <line x1=\"310\" y1=\"310\" x2=\"500.5\" y2=\"200\" stroke=\"rgba(0,0,0,0.08)\" stroke-width=\"1.5\" stroke-dasharray=\"4 6\"><\u002Fline>\n            <line x1=\"310\" y1=\"310\" x2=\"500.5\" y2=\"420\" stroke=\"rgba(0,0,0,0.08)\" stroke-width=\"1.5\" stroke-dasharray=\"4 6\"><\u002Fline>\n            <line x1=\"310\" y1=\"310\" x2=\"310\" y2=\"530\" stroke=\"rgba(0,0,0,0.08)\" stroke-width=\"1.5\" stroke-dasharray=\"4 6\"><\u002Fline>\n            <line x1=\"310\" y1=\"310\" x2=\"119.5\" y2=\"420\" stroke=\"rgba(0,0,0,0.08)\" stroke-width=\"1.5\" stroke-dasharray=\"4 6\"><\u002Fline>\n            <line x1=\"310\" y1=\"310\" x2=\"119.5\" y2=\"200\" stroke=\"rgba(0,0,0,0.08)\" stroke-width=\"1.5\" stroke-dasharray=\"4 6\"><\u002Fline>\n          <\u002Fsvg>\n          <div class=\"az-hub\"><span class=\"m wordmark\">vyb<\u002Fspan><span class=\"s\">Ops engine<\u002Fspan><\u002Fdiv>\n          <div class=\"az-node\" style=\"left:50%;top:14.5%;\">1<\u002Fdiv>\n          <div class=\"az-node\" style=\"left:80.7%;top:32.3%;\">2<\u002Fdiv>\n          <div class=\"az-node\" style=\"left:80.7%;top:67.7%;\">3<\u002Fdiv>\n          <div class=\"az-node\" style=\"left:50%;top:85.5%;\">4<\u002Fdiv>\n          <div class=\"az-node\" style=\"left:19.3%;top:67.7%;\">5<\u002Fdiv>\n          <div class=\"az-node\" style=\"left:19.3%;top:32.3%;\">6<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 8 · WHO VYBS WELL -->\n  <section data-label=\"Market\">\n    <div class=\"slide\">\n      <span class=\"slide-num\">05<\u002Fspan>\n      <div class=\"s-head\">\n        <span class=\"eyebrow\">Who VYBs well<\u002Fspan>\n        <h2 class=\"title\">Built for the rooms that run live events.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"mkt\">\n        <div class=\"mkt-card\"><div class=\"n\">01<\u002Fdiv><h4>Hotels<\u002Fh4><p>Residencies, lobby sets &amp; in-house events on one ledger.<\u002Fp><\u002Fdiv>\n        <div class=\"mkt-card\"><div class=\"n\">02<\u002Fdiv><h4>Hospitality groups<\u002Fh4><p>Programming across a whole portfolio of venues.<\u002Fp><\u002Fdiv>\n        <div class=\"mkt-card\"><div class=\"n\">03<\u002Fdiv><h4>Stadiums<\u002Fh4><p>High-stakes settlements &amp; payouts at arena scale.<\u002Fp><\u002Fdiv>\n        <div class=\"mkt-card\"><div class=\"n\">04<\u002Fdiv><h4>Large-scale venues<\u002Fh4><p>Holds, offers &amp; routing for a packed calendar.<\u002Fp><\u002Fdiv>\n        <div class=\"mkt-card\"><div class=\"n\">05<\u002Fdiv><h4>Restaurants<\u002Fh4><p>Talent for service &amp; private events, settled nightly.<\u002Fp><\u002Fdiv>\n        <div class=\"mkt-card\"><div class=\"n\">06<\u002Fdiv><h4>Clubs<\u002Fh4><p>DJs, deposits, night-of splits &amp; venue reputation.<\u002Fp><\u002Fdiv>\n        <div class=\"mkt-card\"><div class=\"n\">07<\u002Fdiv><h4>Booking agents<\u002Fh4><p>Hold queue &amp; offers across a whole roster.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footer-mark\"><span class=\"app-icon\">v<\u002Fspan> vyb<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 9 · VISION / STRIPE -->\n  <section data-label=\"Vision\">\n    <div class=\"slide dark\">\n      <div class=\"vision-wrap\">\n        <span class=\"eyebrow\">The thesis<\u002Fspan>\n        <h1>The <em>Stripe<\u002Fem> for the<br>live entertainment economy.<\u002Fh1>\n        <div class=\"analogy\">\n          <div class=\"analogy-row stripe\">\n            <div class=\"who\">Stripe<\u002Fdiv>\n            <div class=\"what\">built the infrastructure for internet commerce.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"analogy-row vyb\">\n            <div class=\"who\"><span class=\"app-icon\">v<\u002Fspan> vyb<\u002Fdiv>\n            <div class=\"what\">is building the infrastructure for <b>the movement of money and operations<\u002Fb> across the live entertainment industry.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"foot-tag\">VYB · INFRASTRUCTURE<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 10 · REVENUE ARCHITECTURE -->\n  <section data-label=\"Architecture\">\n    <div class=\"slide\">\n      <span class=\"slide-num\">06<\u002Fspan>\n      <div class=\"s-head\">\n        <span class=\"eyebrow\">Revenue architecture<\u002Fspan>\n        <h2 class=\"title\">Four layers. One operating system.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"arch\">\n        <div class=\"layer\">\n          <div><div class=\"lnum\">LAYER 01<\u002Fdiv><div class=\"lname\">Platform software<\u002Fdiv><\u002Fdiv>\n          <div class=\"lprod\">Artist, vendor, contract &amp; event management · settlement reporting · workflow automation<\u002Fdiv>\n          <div class=\"lrev\"><span>Subscription<\u002Fspan><span>Enterprise licensing<\u002Fspan><span>Setup fees<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"layer\">\n          <div><div class=\"lnum\">LAYER 02<\u002Fdiv><div class=\"lname\">Payment facilitation<\u002Fdiv><\u002Fdiv>\n          <div class=\"lprod\">Artist payouts, vendor &amp; contractor payments, production settlements, sponsorship disbursements<\u002Fdiv>\n          <div class=\"lrev\"><span>Processing<\u002Fspan><span>Settlement fees<\u002Fspan><span>Instant payout<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"layer\">\n          <div><div class=\"lnum\">LAYER 03<\u002Fdiv><div class=\"lname\">Embedded financial services<\u002Fdiv><\u002Fdiv>\n          <div class=\"lprod\">Vendor financing · artist advances · festival working capital · invoice financing<\u002Fdiv>\n          <div class=\"lrev\"><span>Origination<\u002Fspan><span>Interest spread<\u002Fspan><span>Revenue share<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"layer\">\n          <div><div class=\"lnum\">LAYER 04<\u002Fdiv><div class=\"lname\">Industry intelligence<\u002Fdiv><\u002Fdiv>\n          <div class=\"lprod\">Venue &amp; festival benchmarking · artist demand · operational &amp; financial insights<\u002Fdiv>\n          <div class=\"lrev\"><span>Premium data<\u002Fspan><span>Analytics packages<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"arch-note\">Each layer deepens dependency — and the layers below fund the higher-margin layers above.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 11 · FLYWHEEL -->\n  <section data-label=\"Flywheel\">\n    <div class=\"slide\">\n      <span class=\"slide-num\">07<\u002Fspan>\n      <div class=\"s-head\">\n        <span class=\"eyebrow\">The flywheel<\u002Fspan>\n        <h2 class=\"title\">Every show makes the next one easier.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"fly-stage\">\n        <div class=\"fly-ring\">\n          <svg viewBox=\"0 0 640 640\" aria-hidden=\"true\">\n            <defs>\n              <marker id=\"fa\" markerWidth=\"10\" markerHeight=\"10\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"#0071e3\"><\u002Fpath><\u002Fmarker>\n            <\u002Fdefs>\n            <circle cx=\"320\" cy=\"320\" r=\"232\" fill=\"none\" stroke=\"rgba(0,0,0,0.08)\" stroke-width=\"1.5\"><\u002Fcircle>\n            <path d=\"M 320 88 A 232 232 0 1 1 250 99\" fill=\"none\" stroke=\"#0071e3\" stroke-width=\"2.5\" stroke-linecap=\"round\" marker-end=\"url(#fa)\" stroke-dasharray=\"10 10\" opacity=\"0.85\"><\u002Fpath>\n          <\u002Fsvg>\n          <div class=\"fly-center\"><div class=\"t\">Compounds<br>with scale<\u002Fdiv><div class=\"s\">More volume → more data → more product.<\u002Fdiv><\u002Fdiv>\n          <div class=\"fly-node\" style=\"left:50%;top:13.5%;\"><div class=\"b\">1<\u002Fdiv><div class=\"l\">Orgs operate<br>through VYB<\u002Fdiv><\u002Fdiv>\n          <div class=\"fly-node\" style=\"left:84%;top:31.5%;\"><div class=\"b\">2<\u002Fdiv><div class=\"l\">Payments flow<br>through VYB<\u002Fdiv><\u002Fdiv>\n          <div class=\"fly-node\" style=\"left:84%;top:68.5%;\"><div class=\"b\">3<\u002Fdiv><div class=\"l\">Financial data<br>is created<\u002Fdiv><\u002Fdiv>\n          <div class=\"fly-node\" style=\"left:50%;top:86.5%;\"><div class=\"b\">4<\u002Fdiv><div class=\"l\">Financing<br>opportunities open<\u002Fdiv><\u002Fdiv>\n          <div class=\"fly-node\" style=\"left:16%;top:68.5%;\"><div class=\"b\">5<\u002Fdiv><div class=\"l\">More revenue<br>per customer<\u002Fdiv><\u002Fdiv>\n          <div class=\"fly-node\" style=\"left:16%;top:31.5%;\"><div class=\"b\">6<\u002Fdiv><div class=\"l\">Retention &amp;<br>network effects<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 12 · GTM PHASES -->\n  <section data-label=\"Go-to-market\">\n    <div class=\"slide\">\n      <span class=\"slide-num\">08<\u002Fspan>\n      <div class=\"s-head\">\n        <span class=\"eyebrow\">Go-to-market<\u002Fspan>\n        <h2 class=\"title\">Land the operations. Then own the money.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"phases\">\n        <div class=\"phase\">\n          <div class=\"ptag\">Phase 01 <span class=\"now\">NOW<\u002Fspan><\u002Fdiv>\n          <h3>Land anchor customers<\u002Fh3>\n          <p>Get festivals, venue groups &amp; studios running their operations through VYB. Optimize for adoption, not margin.<\u002Fp>\n          <div class=\"pmodel\">\n            <div class=\"ph\">Revenue<\u002Fdiv>\n            <ul><li>$250–$2,500 / mo platform fee<\u002Fli><li>$2.5K–$25K implementation<\u002Fli><li>Annual enterprise contracts<\u002Fli><\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"phase\">\n          <div class=\"ptag\">Phase 02<\u002Fdiv>\n          <h3>Own payment flows<\u002Fh3>\n          <p>Route vendor, artist, contractor &amp; sponsor settlements through VYB and monetize transaction volume.<\u002Fp>\n          <div class=\"pmodel\">\n            <div class=\"ph\">Revenue<\u002Fdiv>\n            <ul><li>0.25%–1% of payment volume<\u002Fli><li>A $5M festival → $12.5K–$50K / yr<\u002Fli><li>Instant-payout &amp; FX fees<\u002Fli><\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"phase\">\n          <div class=\"ptag\">Phase 03<\u002Fdiv>\n          <h3>Embedded finance<\u002Fh3>\n          <p>Advance capital against contracted receivables — repaid automatically from settlement. The highest-margin layer.<\u002Fp>\n          <div class=\"pmodel\">\n            <div class=\"ph\">Revenue<\u002Fdiv>\n            <ul><li>Vendor &amp; invoice financing<\u002Fli><li>Artist advances<\u002Fli><li>Festival working capital<\u002Fli><\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footer-mark\"><span class=\"app-icon\">v<\u002Fspan> vyb<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 13 · MARKET SIZING -->\n  <section data-label=\"Market size\">\n    <div class=\"slide\">\n      <span class=\"slide-num\">09<\u002Fspan>\n      <div class=\"tam\">\n        <div>\n          <span class=\"eyebrow\" style=\"display:block;margin-bottom:28px;\">Market<\u002Fspan>\n          <h2 class=\"title\" style=\"font-size:50px;margin-bottom:14px;\">The TAM isn't software spend.<br>It's transaction volume.<\u002Fh2>\n          <div class=\"tam-list\">\n            <div class=\"tam-row t1\">\n              <div class=\"th\"><span class=\"tk\">TAM<\u002Fspan><span class=\"tv\">Long-term<\u002Fspan><\u002Fdiv>\n              <p>Global live entertainment &amp; music operations — hundreds of billions in annual economic activity across festivals, venues, touring, sponsorship &amp; production.<\u002Fp>\n            <\u002Fdiv>\n            <div class=\"tam-row t2\">\n              <div class=\"th\"><span class=\"tk\">SAM<\u002Fspan><span class=\"tv\">Near-term<\u002Fspan><\u002Fdiv>\n              <p>Mid-sized festivals, independent venue groups, studios &amp; regional promoters — big enough to spend, small enough to move fast.<\u002Fp>\n            <\u002Fdiv>\n            <div class=\"tam-row t3\">\n              <div class=\"th\"><span class=\"tk\">SOM<\u002Fspan><span class=\"tv\">First 3–5 years<\u002Fspan><\u002Fdiv>\n              <p>100–500 venues · 25–100 festivals · thousands of connected artists &amp; vendors routing volume through the platform.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"tam-circles\">\n          <div class=\"tam-c c1\"><span>TAM<\u002Fspan><\u002Fdiv>\n          <div class=\"tam-c c2\"><span>SAM<\u002Fspan><\u002Fdiv>\n          <div class=\"tam-c c3\"><span>SOM<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 14 · THE WEDGE -->\n  <section data-label=\"The wedge\">\n    <div class=\"slide\">\n      <span class=\"slide-num\">10<\u002Fspan>\n      <div class=\"s-head\" style=\"margin-bottom:38px;\">\n        <span class=\"eyebrow\">The wedge<\u002Fspan>\n        <h2 class=\"title\">Settlement &amp; vendor payments.<br>The way in.<\u002Fh2>\n        <p class=\"wedge-lead\">Not a consumer music app — VYB is the <b>settlement &amp; payments platform for live-entertainment operators<\u002Fb>. A problem that's universal, painful, recurring, and touches money at every event.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"wedge-body\">\n        <div class=\"wedge-chips\">\n          <div class=\"wedge-chip\">Clubs<\u002Fdiv>\n          <div class=\"wedge-chip\">Theaters<\u002Fdiv>\n          <div class=\"wedge-chip\">Mid-size festivals<\u002Fdiv>\n          <div class=\"wedge-chip\">Venue groups<\u002Fdiv>\n          <div class=\"wedge-chip\">Studios<\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"wedge-foot\">Own one painful workflow end-to-end — then expand into <b>payments, treasury, financing &amp; analytics.<\u002Fb><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"footer-mark\"><span class=\"app-icon\">v<\u002Fspan> vyb<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 15 · WHY A STADIUM -->\n  <section data-label=\"Why a stadium\">\n    <div class=\"slide\">\n      <span class=\"slide-num\">11<\u002Fspan>\n      <div class=\"s-head\" style=\"margin-bottom:34px;\">\n        <span class=\"eyebrow\">Why a stadium<\u002Fspan>\n        <h2 class=\"title\">A small city — running for one night.<\u002Fh2>\n        <p class=\"wedge-lead\">A single event fires <b>thousands of payment relationships<\u002Fb> at once. That complexity is exactly what payments infrastructure is built to own.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"payee-grid\">\n        <div class=\"payee\"><div class=\"pk\">Vendors<\u002Fdiv><div class=\"pd\">Merch, supplies, rentals<\u002Fdiv><\u002Fdiv>\n        <div class=\"payee\"><div class=\"pk\">Sponsors<\u002Fdiv><div class=\"pd\">Activation settlements<\u002Fdiv><\u002Fdiv>\n        <div class=\"payee\"><div class=\"pk\">Food &amp; beverage<\u002Fdiv><div class=\"pd\">Concession operators<\u002Fdiv><\u002Fdiv>\n        <div class=\"payee\"><div class=\"pk\">Security<\u002Fdiv><div class=\"pd\">Contracted firms<\u002Fdiv><\u002Fdiv>\n        <div class=\"payee\"><div class=\"pk\">Parking<\u002Fdiv><div class=\"pd\">Lot operators<\u002Fdiv><\u002Fdiv>\n        <div class=\"payee\"><div class=\"pk\">Production<\u002Fdiv><div class=\"pd\">Crews &amp; staging<\u002Fdiv><\u002Fdiv>\n        <div class=\"payee\"><div class=\"pk\">Performers<\u002Fdiv><div class=\"pd\">Talent &amp; guarantees<\u002Fdiv><\u002Fdiv>\n        <div class=\"payee\"><div class=\"pk\">Temporary labor<\u002Fdiv><div class=\"pd\">Day-of staff<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"settle-bar\">\n        <div class=\"sb-mark\">v<\u002Fdiv>\n        <div><div class=\"sb-t\">Every relationship settles through one layer.<\u002Fdiv><div class=\"sb-s\">Each transaction tagged to an event, a vendor, and a contract.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- THE CONTROL CENTER -->\n  <section data-label=\"The control center\">\n    <div class=\"slide\">\n      <div class=\"s-head\" style=\"margin-bottom:30px;\">\n        <span class=\"eyebrow\">The control center<\u002Fspan>\n        <h2 class=\"title\">Operators run six systems.<br>They should run one.<\u002Fh2>\n        <p class=\"wedge-lead\">POS, processor, settlement portal, vendor payouts, accounting, reporting — six logins and a reconciliation nightmare. VYB is the financial control center for a venue, festival or tour. <b>The PayFac is just the engine underneath.<\u002Fb><\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:44px;flex:1;\">\n        <div style=\"flex:1;\">\n          <div style=\"font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:var(--ink-2);margin-bottom:14px;\">Today · six tools<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;\">\n            <div style=\"border:1px solid rgba(0,0,0,0.12);border-radius:12px;padding:14px 16px;font-size:17px;font-weight:500;color:var(--ink);background:#fff;\">POS software<\u002Fdiv>\n            <div style=\"border:1px solid rgba(0,0,0,0.12);border-radius:12px;padding:14px 16px;font-size:17px;font-weight:500;color:var(--ink);background:#fff;\">Merchant processor<\u002Fdiv>\n            <div style=\"border:1px solid rgba(0,0,0,0.12);border-radius:12px;padding:14px 16px;font-size:17px;font-weight:500;color:var(--ink);background:#fff;\">Settlement portal<\u002Fdiv>\n            <div style=\"border:1px solid rgba(0,0,0,0.12);border-radius:12px;padding:14px 16px;font-size:17px;font-weight:500;color:var(--ink);background:#fff;\">Vendor payouts<\u002Fdiv>\n            <div style=\"border:1px solid rgba(0,0,0,0.12);border-radius:12px;padding:14px 16px;font-size:17px;font-weight:500;color:var(--ink);background:#fff;\">Accounting<\u002Fdiv>\n            <div style=\"border:1px solid rgba(0,0,0,0.12);border-radius:12px;padding:14px 16px;font-size:17px;font-weight:500;color:var(--ink);background:#fff;\">Reporting<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:46px;color:var(--accent);font-weight:300;line-height:1;\">→<\u002Fdiv>\n        <div style=\"flex:0 0 300px;\">\n          <div style=\"background:var(--vyb-grad);color:#fff;border-radius:20px;padding:36px 28px;text-align:center;box-shadow:0 18px 50px -20px rgba(0,113,227,0.5);\">\n            <div style=\"font-size:32px;font-weight:700;letter-spacing:-0.01em;\">VYB<\u002Fdiv>\n            <div style=\"font-size:17px;opacity:0.92;margin-top:6px;\">One financial control center<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:center;font-size:13px;letter-spacing:0.4px;color:var(--ink-2);margin-top:14px;\">PayFac engine underneath<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 16 · ABOVE THE RAILS -->\n  <section data-label=\"Above the rails\">\n    <div class=\"slide dark\">\n      <div class=\"vision-wrap\">\n        <span class=\"eyebrow\">The position<\u002Fspan>\n        <h1>We sit <em>above<\u002Fem> the rails.<\u002Fh1>\n        <div class=\"analogy\">\n          <div class=\"analogy-row stripe\">\n            <div class=\"who\">Processors<\u002Fdiv>\n            <div class=\"what\">Stripe, Adyen &amp; banks move the money underneath.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"analogy-row vyb\">\n            <div class=\"who\"><span class=\"app-icon\">v<\u002Fspan> vyb<\u002Fdiv>\n            <div class=\"what\">owns the <b>workflow, settlement logic, relationships &amp; financial data<\u002Fb> — where the defensibility and the value compound.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"rails-note\" style=\"margin-top:30px;font-size:18px;line-height:1.5;color:#8e8e93;max-width:820px;\">Managed on these rails today, a registered Payfac at scale — the take expands as we internalize the stack.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"foot-tag\">VYB · FINANCIAL OS<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PAYMENTS ROADMAP -->\n  <section data-label=\"Payments roadmap\">\n    <div class=\"slide\">\n      <div class=\"s-head\">\n        <span class=\"eyebrow\">The payments roadmap<\u002Fspan>\n        <h2 class=\"title\">Layer on Stripe today.<br>Own the rails at scale.<\u002Fh2>\n        <p class=\"wedge-lead\">Margin is a timeline, not a leap — we start as a thin layer on the rails for speed and graduate to a registered Payfac as volume compounds, so the take expands at every step. <b>GPV thresholds illustrative.<\u002Fb><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"phases\">\n        <div class=\"phase\">\n          <div class=\"ptag\">Stage 01 <span class=\"now\">NOW<\u002Fspan><\u002Fdiv>\n          <h3>Layer on the rails<\u002Fh3>\n          <p>Stripe Connect &amp; Adyen for Platforms. Onboard sub-merchants, split &amp; settle — capital-light, optimize for adoption.<\u002Fp>\n          <div class=\"pmodel\">\n            <div class=\"ph\">Net take<\u002Fdiv>\n            <ul><li>~0.1–0.2% on GPV<\u002Fli><li>Provider holds registration &amp; risk<\u002Fli><li>Day one<\u002Fli><\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"phase\">\n          <div class=\"ptag\">Stage 02<\u002Fdiv>\n          <h3>Managed Payfac<\u002Fh3>\n          <p>Payfac-as-a-Service (Finix \u002F Infinicept). VYB owns onboarding &amp; risk rules; the provider keeps the card-network registration.<\u002Fp>\n          <div class=\"pmodel\">\n            <div class=\"ph\">Net take<\u002Fdiv>\n            <ul><li>~0.25–0.4% on GPV<\u002Fli><li>Instant payouts &amp; branded onboarding<\u002Fli><li>~$25–50M GPV<\u002Fli><\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"phase\">\n          <div class=\"ptag\">Stage 03<\u002Fdiv>\n          <h3>Registered Payfac<\u002Fh3>\n          <p>Visa \u002F Mastercard Payfac program + sponsor bank. VYB becomes the registered facilitator and merchant of record.<\u002Fp>\n          <div class=\"pmodel\">\n            <div class=\"ph\">Net take<\u002Fdiv>\n            <ul><li>~0.4%+ blended — the at-scale figure<\u002Fli><li>Embedded finance switches on<\u002Fli><li>~$75–100M+ GPV<\u002Fli><\u002Ful>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 17 · RECONCILIATION ENGINE -->\n  <section data-label=\"Reconciliation engine\">\n    <div class=\"slide\">\n      <span class=\"slide-num\">12<\u002Fspan>\n      <div class=\"s-head\" style=\"margin-bottom:22px;\">\n        <span class=\"eyebrow\">The Payfac<\u002Fspan>\n        <h2 class=\"title\">A payment facilitator for live entertainment.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"flow\">\n        <div class=\"flow-cap\">Sub-merchants · onboarded by VYB (KYB \u002F KYC)<\u002Fdiv>\n        <div class=\"flow-chips\">\n          <div class=\"flow-chip\">Venues<\u002Fdiv>\n          <div class=\"flow-chip\">Artists<\u002Fdiv>\n          <div class=\"flow-chip\">Vendors<\u002Fdiv>\n          <div class=\"flow-chip\">Concessions<\u002Fdiv>\n          <div class=\"flow-chip\">Sponsors<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"flow-arrow\">↓<\u002Fdiv>\n        <div class=\"flow-bar\"><div class=\"fb-t\">VYB · Payment Facilitator<\u002Fdiv><div class=\"fb-s\">Holds the master merchant account — every dollar captured the moment it lands<\u002Fdiv><\u002Fdiv>\n        <div class=\"flow-cap\">Agentic finance layer<\u002Fdiv>\n        <div class=\"agent-trio\">\n          <div class=\"agent\"><div class=\"ak\">Settlement<\u002Fdiv><div class=\"ad\">Splits funds &amp; pays every sub-merchant<\u002Fdiv><\u002Fdiv>\n          <div class=\"agent\"><div class=\"ak\">Reconciliation<\u002Fdiv><div class=\"ad\">Detects missing transactions &amp; revenue leakage<\u002Fdiv><\u002Fdiv>\n          <div class=\"agent\"><div class=\"ak\">Compliance<\u002Fdiv><div class=\"ad\">AML \u002F KYC, tax (1099s) &amp; audit trail<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"flow-arrow\">↓<\u002Fdiv>\n        <div class=\"flow-bar ledger\"><div class=\"fb-t\">VYB Master Ledger<\u002Fdiv><div class=\"fb-s\">Split &amp; settled to every sub-merchant — venue, artists, vendors, sponsors<\u002Fdiv><\u002Fdiv>\n        <div class=\"flow-cap\">Managed Payfac on Stripe · Adyen → registered at scale<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 18 · KILLER FEATURE -->\n  <section data-label=\"Killer feature\">\n    <div class=\"slide\">\n      <span class=\"slide-num\">13<\u002Fspan>\n      <div class=\"s-head\" style=\"margin-bottom:32px;\">\n        <span class=\"eyebrow\">The killer feature<\u002Fspan>\n        <h2 class=\"title\">$33M, reconciled overnight.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"ba\">\n        <div class=\"ba-col ba-today\">\n          <div class=\"ba-tag\">Today<\u002Fdiv>\n          <div class=\"ba-h\">A sold-out stadium night — $33M grossed across tickets, VIP, merch, F&amp;B &amp; parking.<\u002Fdiv>\n          <ul class=\"ba-mess\">\n            <li>40+ vendors &amp; contractors<\u002Fli>\n            <li>6 payment &amp; ticketing systems<\u002Fli>\n            <li>Promoter, venue &amp; tour accounting<\u002Fli>\n            <li>Dozens of spreadsheets<\u002Fli>\n          <\u002Ful>\n          <div class=\"ba-foot\">Weeks to reconcile.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ba-col ba-vyb\">\n          <div class=\"ba-tag\">With VYB<\u002Fdiv>\n          <div class=\"ba-h\">Doors close Sunday, 11:59 PM. The agent executes:<\u002Fdiv>\n          <ul class=\"ba-check\">\n            <li>Vendor revenue split<\u002Fli>\n            <li>Artist settlement<\u002Fli>\n            <li>Sponsor revenue share<\u002Fli>\n            <li>Tax allocation &amp; chargeback reserve<\u002Fli>\n            <li>Venue settlement<\u002Fli>\n          <\u002Ful>\n          <div class=\"ba-foot\">Completed overnight.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 19 · ECONOMICS -->\n  <section data-label=\"Economics\">\n    <div class=\"slide\">\n      <span class=\"slide-num\">14<\u002Fspan>\n      <div class=\"s-head\" style=\"margin-bottom:32px;\">\n        <span class=\"eyebrow\">The economics<\u002Fspan>\n        <h2 class=\"title\">One venue. Real volume.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"econ-eq\">\n        <div class=\"eq-step\"><div class=\"eq-n\">150<\u002Fdiv><div class=\"eq-l\">events \u002F year at one regional venue<\u002Fdiv><\u002Fdiv>\n        <div class=\"eq-arrow\">→<\u002Fdiv>\n        <div class=\"eq-step\"><div class=\"eq-n\">$40M<\u002Fdiv><div class=\"eq-l\">gross payment volume — $20M owned acceptance + $20M payouts<\u002Fdiv><\u002Fdiv>\n        <div class=\"eq-arrow\">→<\u002Fdiv>\n        <div class=\"eq-step\"><div class=\"eq-n\">0.40<span class=\"u\">%<\u002Fspan><\u002Fdiv><div class=\"eq-l\">blended net take on GPV at scale<\u002Fdiv><\u002Fdiv>\n        <div class=\"eq-arrow\">=<\u002Fdiv>\n        <div class=\"eq-step final\"><div class=\"eq-n\">$160K<span class=\"u\"> + SaaS<\u002Fspan><\u002Fdiv><div class=\"eq-l\">per venue, per year<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"econ-foot\" style=\"margin-top:30px;\">Each venue is ~<b>$160K a year<\u002Fb> in payment facilitation, plus SaaS. Start with 10 anchor accounts, scale to ~200 operators routing their GPV through VYB, and the <b>four revenue layers<\u002Fb> stack into ~$4.5M \u002F month:<\u002Fp>\n      <div class=\"path1m\">\n        <div class=\"path-bar\">\n          <div class=\"path-seg s1\" style=\"flex:60;\"><div class=\"pv\">$0.6M<\u002Fdiv><div class=\"pl\">Platform software<\u002Fdiv><\u002Fdiv>\n          <div class=\"path-seg s2\" style=\"flex:270;\"><div class=\"pv\">$2.7M<\u002Fdiv><div class=\"pl\">Payment facilitation<\u002Fdiv><\u002Fdiv>\n          <div class=\"path-seg s3\" style=\"flex:90;\"><div class=\"pv\">$0.9M<\u002Fdiv><div class=\"pl\">Embedded finance<\u002Fdiv><\u002Fdiv>\n          <div class=\"path-seg s4\" style=\"flex:30;\"><div class=\"pv\">$0.3M<\u002Fdiv><div class=\"pl\">Industry intelligence<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"path-total\">= <b>$4.5M \u002F month<\u002Fb> recurring · ≈ $54M ARR<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- THE ANCHOR PARTNER -->\n  <section data-label=\"The anchor\">\n    <div class=\"slide dark\">\n      <div class=\"s-head\" style=\"margin-bottom:22px;\">\n        <span class=\"eyebrow\">The anchor<\u002Fspan>\n        <h2 class=\"title\" style=\"font-size:46px;\">One artist lights up the whole network.<\u002Fh2>\n        <p style=\"font-size:24px;line-height:1.5;color:#c7c7cc;max-width:80ch;margin-top:14px;\">The move isn't a celebrity endorsement. A top-tier stadium artist joins as an equity holder, an operational design partner, and VYB's first major transaction network — bringing their entire ecosystem onto the rails.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:22px;\">\n        <div style=\"border:1px solid rgba(255,255,255,0.14);border-radius:16px;padding:20px;\"><div style=\"font-size:20px;font-weight:600;color:#f5f5f7;margin-bottom:8px;\">Equity holder<\u002Fdiv><div style=\"font-size:17px;line-height:1.5;color:#a1a1a6;\">Aligned for the long game — incentivized to grow VYB and bring others, not cash a check.<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(255,255,255,0.14);border-radius:16px;padding:20px;\"><div style=\"font-size:20px;font-weight:600;color:#f5f5f7;margin-bottom:8px;\">Operational design partner<\u002Fdiv><div style=\"font-size:17px;line-height:1.5;color:#a1a1a6;\">Their tour's real workflows shape the product — built for the hardest events from day one.<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(255,255,255,0.14);border-radius:16px;padding:20px;\"><div style=\"font-size:20px;font-weight:600;color:#f5f5f7;margin-bottom:8px;\">First transaction network<\u002Fdiv><div style=\"font-size:17px;line-height:1.5;color:#a1a1a6;\">Their venues, vendors, crew &amp; sponsors all transact through VYB to work with them.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border:1px solid rgba(255,255,255,0.14);border-radius:16px;padding:20px 24px;background:rgba(0,113,227,0.08);\">\n        <div style=\"font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:#8e8e93;margin-bottom:8px;\">Illustrative ignition<\u002Fdiv>\n        <div style=\"font-size:20px;line-height:1.5;color:#f5f5f7;\">A <b>$33M\u002Fshow, $500M+ tour<\u002Fb> routed through VYB clears the Stage-2\u002F3 PayFac thresholds from a single anchor — onboarding its venues, vendors, crew &amp; sponsors, and seeding the data moat with the highest-signal events on earth.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- THE LAUNCH -->\n  <section data-label=\"The launch\">\n    <div class=\"slide dark\">\n      <div class=\"s-head\" style=\"margin-bottom:24px;\">\n        <span class=\"eyebrow\">The launch<\u002Fspan>\n        <h2 class=\"title\" style=\"font-size:46px;\">One concert lands the whole network.<\u002Fh2>\n        <p style=\"font-size:24px;line-height:1.5;color:#c7c7cc;max-width:78ch;margin-top:14px;\">We don't sell account by account. We run one flagship show end-to-end — and to be part of it, every party has to transact through VYB.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px;\">\n        <div style=\"border:1px solid rgba(255,255,255,0.14);border-radius:16px;padding:22px;\"><div style=\"font-size:14px;font-weight:700;letter-spacing:1px;color:var(--accent);margin-bottom:10px;\">01<\u002Fdiv><div style=\"font-size:20px;font-weight:600;color:#f5f5f7;margin-bottom:8px;\">One flagship show<\u002Fdiv><div style=\"font-size:16px;line-height:1.5;color:#a1a1a6;\">VYB runs the full financial stack for a top-tier concert — settlements, payouts, merch &amp; reconciliation.<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(255,255,255,0.14);border-radius:16px;padding:22px;\"><div style=\"font-size:14px;font-weight:700;letter-spacing:1px;color:var(--accent);margin-bottom:10px;\">02<\u002Fdiv><div style=\"font-size:20px;font-weight:600;color:#f5f5f7;margin-bottom:8px;\">The ecosystem onboards<\u002Fdiv><div style=\"font-size:16px;line-height:1.5;color:#a1a1a6;\">Venue, vendors, crew, sponsors, merch &amp; box office — all transacting through VYB to work the show.<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(255,255,255,0.14);border-radius:16px;padding:22px;\"><div style=\"font-size:14px;font-weight:700;letter-spacing:1px;color:var(--accent);margin-bottom:10px;\">03<\u002Fdiv><div style=\"font-size:20px;font-weight:600;color:#f5f5f7;margin-bottom:8px;\">Then expand<\u002Fdiv><div style=\"font-size:16px;line-height:1.5;color:#a1a1a6;\">The venue's ~150 events a year, the vendors' other gigs, the next artist. One show becomes the network.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:16px;color:#8e8e93;margin-top:22px;\"><b style=\"color:#c7c7cc;\">$33M in one night<\u002Fb> — proof, volume, data &amp; a live network, from a single event.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- THE NETWORK (agent-to-agent) -->\n  <section data-label=\"The network\">\n    <div class=\"slide dark\">\n      <div class=\"s-head\" style=\"margin-bottom:14px;\">\n        <span class=\"eyebrow\">The network<\u002Fspan>\n        <h2 class=\"title\" style=\"font-size:46px;\">Agents that transact with agents.<\u002Fh2>\n        <p style=\"font-size:24px;line-height:1.5;color:#c7c7cc;max-width:74ch;margin-top:14px;\">Every party runs a VYB agent — artist, venue, agency, vendor, sponsor, crew. They interface, negotiate &amp; settle directly with one another, with VYB as the protocol and rails underneath. Every new agent is a new counterpart for all the rest.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex:1;display:flex;align-items:center;justify-content:center;\">\n        <svg viewBox=\"0 0 1000 460\" style=\"width:100%;max-width:800px;height:auto;\" xmlns=\"http:\u002F\u002Fwww.w3.org\u002F2000\u002Fsvg\"><defs><linearGradient id=\"vg\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0\" stop-color=\"#0071e3\"><\u002Fstop><stop offset=\"1\" stop-color=\"#5e5ce6\"><\u002Fstop><\u002FlinearGradient><\u002Fdefs><line x1=\"500\" y1=\"80\" x2=\"794\" y2=\"155\" stroke=\"rgba(255,255,255,0.10)\" stroke-width=\"1\"><\u002Fline><line x1=\"794\" y1=\"155\" x2=\"794\" y2=\"305\" stroke=\"rgba(255,255,255,0.10)\" stroke-width=\"1\"><\u002Fline><line x1=\"794\" y1=\"305\" x2=\"500\" y2=\"380\" stroke=\"rgba(255,255,255,0.10)\" stroke-width=\"1\"><\u002Fline><line x1=\"500\" y1=\"380\" x2=\"206\" y2=\"305\" stroke=\"rgba(255,255,255,0.10)\" stroke-width=\"1\"><\u002Fline><line x1=\"206\" y1=\"305\" x2=\"206\" y2=\"155\" stroke=\"rgba(255,255,255,0.10)\" stroke-width=\"1\"><\u002Fline><line x1=\"206\" y1=\"155\" x2=\"500\" y2=\"80\" stroke=\"rgba(255,255,255,0.10)\" stroke-width=\"1\"><\u002Fline><line x1=\"500\" y1=\"230\" x2=\"500\" y2=\"80\" stroke=\"rgba(0,113,227,0.55)\" stroke-width=\"1.5\"><\u002Fline><line x1=\"500\" y1=\"230\" x2=\"794\" y2=\"155\" stroke=\"rgba(0,113,227,0.55)\" stroke-width=\"1.5\"><\u002Fline><line x1=\"500\" y1=\"230\" x2=\"794\" y2=\"305\" stroke=\"rgba(0,113,227,0.55)\" stroke-width=\"1.5\"><\u002Fline><line x1=\"500\" y1=\"230\" x2=\"500\" y2=\"380\" stroke=\"rgba(0,113,227,0.55)\" stroke-width=\"1.5\"><\u002Fline><line x1=\"500\" y1=\"230\" x2=\"206\" y2=\"305\" stroke=\"rgba(0,113,227,0.55)\" stroke-width=\"1.5\"><\u002Fline><line x1=\"500\" y1=\"230\" x2=\"206\" y2=\"155\" stroke=\"rgba(0,113,227,0.55)\" stroke-width=\"1.5\"><\u002Fline><rect x=\"420\" y=\"51\" width=\"160\" height=\"58\" rx=\"14\" fill=\"#000\" stroke=\"rgba(255,255,255,0.22)\"><\u002Frect><text x=\"500\" y=\"78\" text-anchor=\"middle\" font-family=\"-apple-system, BlinkMacSystemFont, sans-serif\" font-size=\"21\" font-weight=\"600\" fill=\"#f5f5f7\">Artist<\u002Ftext><text x=\"500\" y=\"97\" text-anchor=\"middle\" font-family=\"-apple-system, BlinkMacSystemFont, sans-serif\" font-size=\"12\" fill=\"#8e8e93\">agent<\u002Ftext><rect x=\"714\" y=\"126\" width=\"160\" height=\"58\" rx=\"14\" fill=\"#000\" stroke=\"rgba(255,255,255,0.22)\"><\u002Frect><text x=\"794\" y=\"153\" text-anchor=\"middle\" font-family=\"-apple-system, BlinkMacSystemFont, sans-serif\" font-size=\"21\" font-weight=\"600\" fill=\"#f5f5f7\">Venue<\u002Ftext><text x=\"794\" y=\"172\" text-anchor=\"middle\" font-family=\"-apple-system, BlinkMacSystemFont, sans-serif\" font-size=\"12\" fill=\"#8e8e93\">agent<\u002Ftext><rect x=\"714\" y=\"276\" width=\"160\" height=\"58\" rx=\"14\" fill=\"#000\" stroke=\"rgba(255,255,255,0.22)\"><\u002Frect><text x=\"794\" y=\"303\" text-anchor=\"middle\" font-family=\"-apple-system, BlinkMacSystemFont, sans-serif\" font-size=\"21\" font-weight=\"600\" fill=\"#f5f5f7\">Sponsor<\u002Ftext><text x=\"794\" y=\"322\" text-anchor=\"middle\" font-family=\"-apple-system, BlinkMacSystemFont, sans-serif\" font-size=\"12\" fill=\"#8e8e93\">agent<\u002Ftext><rect x=\"420\" y=\"351\" width=\"160\" height=\"58\" rx=\"14\" fill=\"#000\" stroke=\"rgba(255,255,255,0.22)\"><\u002Frect><text x=\"500\" y=\"378\" text-anchor=\"middle\" font-family=\"-apple-system, BlinkMacSystemFont, sans-serif\" font-size=\"21\" font-weight=\"600\" fill=\"#f5f5f7\">Crew<\u002Ftext><text x=\"500\" y=\"397\" text-anchor=\"middle\" font-family=\"-apple-system, BlinkMacSystemFont, sans-serif\" font-size=\"12\" fill=\"#8e8e93\">agent<\u002Ftext><rect x=\"126\" y=\"276\" width=\"160\" height=\"58\" rx=\"14\" fill=\"#000\" stroke=\"rgba(255,255,255,0.22)\"><\u002Frect><text x=\"206\" y=\"303\" text-anchor=\"middle\" font-family=\"-apple-system, BlinkMacSystemFont, sans-serif\" font-size=\"21\" font-weight=\"600\" fill=\"#f5f5f7\">Vendor<\u002Ftext><text x=\"206\" y=\"322\" text-anchor=\"middle\" font-family=\"-apple-system, BlinkMacSystemFont, sans-serif\" font-size=\"12\" fill=\"#8e8e93\">agent<\u002Ftext><rect x=\"126\" y=\"126\" width=\"160\" height=\"58\" rx=\"14\" fill=\"#000\" stroke=\"rgba(255,255,255,0.22)\"><\u002Frect><text x=\"206\" y=\"153\" text-anchor=\"middle\" font-family=\"-apple-system, BlinkMacSystemFont, sans-serif\" font-size=\"21\" font-weight=\"600\" fill=\"#f5f5f7\">Booking agency<\u002Ftext><text x=\"206\" y=\"172\" text-anchor=\"middle\" font-family=\"-apple-system, BlinkMacSystemFont, sans-serif\" font-size=\"12\" fill=\"#8e8e93\">agent<\u002Ftext><circle cx=\"500\" cy=\"230\" r=\"48\" fill=\"url(#vg)\"><\u002Fcircle><text x=\"500\" y=\"238\" text-anchor=\"middle\" font-family=\"-apple-system, BlinkMacSystemFont, sans-serif\" font-size=\"24\" font-weight=\"700\" fill=\"#ffffff\">VYB<\u002Ftext><\u002Fsvg>\n      <\u002Fdiv>\n      <p style=\"text-align:center;font-size:17px;color:#8e8e93;margin-top:6px;\">Artist ⇄ Venue · Booking agency ⇄ Vendors · Tour ⇄ Travel — any party, any workflow, settled agent-to-agent.<\u002Fp>\n      <p style=\"text-align:center;font-size:16px;color:#8e8e93;margin-top:8px;\"><b style=\"color:#c7c7cc;\">Guardrails:<\u002Fb> scoped agent identity · explicit human confirm on every payment · VYB underwrites &amp; reserves the risk.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- THE DATA MOAT -->\n  <section data-label=\"The data moat\">\n    <div class=\"slide dark\">\n      <div class=\"s-head\" style=\"margin-bottom:18px;\">\n        <span class=\"eyebrow\">The data moat<\u002Fspan>\n        <h2 class=\"title\" style=\"font-size:46px;\">The settled truth no one else can see.<\u002Fh2>\n        <p style=\"font-size:24px;line-height:1.5;color:#c7c7cc;max-width:80ch;margin-top:14px;\">VYB sits at the settlement layer — the only vantage point that sees who actually got paid, how fast, who's reliable, and what a room really grosses. It accrues as exhaust, compounds with every show, and can't be backfilled by anyone who shows up later.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"margin-bottom:20px;\">\n        <div style=\"font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:1.4px;color:#8e8e93;margin-bottom:12px;\">What every show teaches VYB<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:10px;\">\n          <span style=\"font-size:16px;line-height:1.2;color:#c7c7cc;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:999px;padding:8px 13px;\">Venue performance<\u002Fspan>\n          <span style=\"font-size:16px;line-height:1.2;color:#c7c7cc;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:999px;padding:8px 13px;\">Concession revenue<\u002Fspan>\n          <span style=\"font-size:16px;line-height:1.2;color:#c7c7cc;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:999px;padding:8px 13px;\">Merch sales<\u002Fspan>\n          <span style=\"font-size:16px;line-height:1.2;color:#c7c7cc;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:999px;padding:8px 13px;\">Settlement timing<\u002Fspan>\n          <span style=\"font-size:16px;line-height:1.2;color:#c7c7cc;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:999px;padding:8px 13px;\">Vendor reliability<\u002Fspan>\n          <span style=\"font-size:16px;line-height:1.2;color:#c7c7cc;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:999px;padding:8px 13px;\">Crew payment history<\u002Fspan>\n          <span style=\"font-size:16px;line-height:1.2;color:#c7c7cc;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:999px;padding:8px 13px;\">Sponsor performance<\u002Fspan>\n          <span style=\"font-size:16px;line-height:1.2;color:#c7c7cc;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:999px;padding:8px 13px;\">Chargeback rates<\u002Fspan>\n          <span style=\"font-size:16px;line-height:1.2;color:#c7c7cc;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:999px;padding:8px 13px;\">Staffing needs<\u002Fspan>\n          <span style=\"font-size:16px;line-height:1.2;color:#c7c7cc;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:999px;padding:8px 13px;\">Payout structures<\u002Fspan>\n          <span style=\"font-size:16px;line-height:1.2;color:#c7c7cc;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:999px;padding:8px 13px;\">Regional demand<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px;\">\n        <div style=\"border:1px solid rgba(255,255,255,0.14);border-radius:16px;padding:20px;\"><div style=\"font-size:20px;font-weight:600;color:#f5f5f7;margin-bottom:8px;\">Underwriting<\u002Fdiv><div style=\"font-size:17px;line-height:1.5;color:#a1a1a6;\">Advance capital against repayment behavior only VYB can see — the financing book, de-risked.<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(255,255,255,0.14);border-radius:16px;padding:20px;\"><div style=\"font-size:20px;font-weight:600;color:#f5f5f7;margin-bottom:8px;\">VYB Score<\u002Fdiv><div style=\"font-size:17px;line-height:1.5;color:#a1a1a6;\">A credit bureau for live events: factual, settlement-derived — not reviews.<\u002Fdiv><\u002Fdiv>\n        <div style=\"border:1px solid rgba(255,255,255,0.14);border-radius:16px;padding:20px;\"><div style=\"font-size:20px;font-weight:600;color:#f5f5f7;margin-bottom:8px;\">Intelligence<\u002Fdiv><div style=\"font-size:17px;line-height:1.5;color:#a1a1a6;\">Demand, routing &amp; benchmarks every operator pays for.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:16px;color:#8e8e93;margin-top:18px;\">The app gets us in. Payments get us the volume. <b style=\"color:#c7c7cc;\">The data is why we can't be caught.<\u002Fb><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WHY WE WIN -->\n  <section data-label=\"Why we win\">\n    <div class=\"slide dark\">\n      <div class=\"s-head\" style=\"margin-bottom:32px;\">\n        <span class=\"eyebrow\">Why we win<\u002Fspan>\n        <h2 class=\"title\">From the group chat to the main stage.<\u002Fh2>\n        <p style=\"font-size:26px;line-height:1.5;color:#c7c7cc;max-width:64ch;margin-top:20px;\">Ticketmaster owns the ticket, Toast &amp; Square the POS, Stripe &amp; Adyen the rails — but <b style=\"color:#f5f5f7;\">none own the cross-party settlement graph of a live event<\u002Fb>. We start in that seam, get artists running on VYB every day, and grow into the events themselves.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:22px;flex:1;align-content:center;\">\n        <div style=\"border:1px solid rgba(255,255,255,0.14);border-radius:16px;padding:26px;\">\n          <div style=\"font-size:24px;font-weight:600;color:#f5f5f7;margin-bottom:10px;\">On both sides of the money<\u002Fdiv>\n          <div style=\"font-size:18px;line-height:1.55;color:#a1a1a6;\">The group chat puts VYB where artists &amp; tours live; the ledger puts it where operators move money. We're the only layer in both — so demand and supply pull each other onto the network.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid rgba(255,255,255,0.14);border-radius:16px;padding:26px;\">\n          <div style=\"font-size:24px;font-weight:600;color:#f5f5f7;margin-bottom:10px;\">Back office first, then the marquee<\u002Fdiv>\n          <div style=\"font-size:18px;line-height:1.55;color:#a1a1a6;\">No fight with Ticketmaster — we own the un-owned settlement &amp; payout layer plus the mid-market's owned box office, F&amp;B &amp; merch. The core stays neutral rails every operator can trust; longer term, the artist network opens an optional path into VYB-promoted events.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid rgba(255,255,255,0.14);border-radius:16px;padding:26px;\">\n          <div style=\"font-size:24px;font-weight:600;color:#f5f5f7;margin-bottom:10px;\">Every event deepens the moat<\u002Fdiv>\n          <div style=\"font-size:18px;line-height:1.55;color:#a1a1a6;\">Each settled show adds vendors, artists &amp; venues to the network and its trust data. Switching cost, routing intelligence &amp; financing edge all compound with volume.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footer-mark\"><span class=\"app-icon\">v<\u002Fspan> vyb<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 17 · NORTH STAR -->\n  <section data-label=\"North star\">\n    <div class=\"slide\">\n      <span class=\"slide-num\">15<\u002Fspan>\n      <div class=\"s-head\">\n        <span class=\"eyebrow\">North star<\u002Fspan>\n        <h2 class=\"title\">We measure dollars moved.<\u002Fh2>\n        <p style=\"font-size:20px;line-height:1.5;color:var(--ink-2);margin-top:10px;max-width:62ch;\">Because every dollar moved teaches VYB something no one else will ever know.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"ns\">\n        <div class=\"ns-hero\">\n          <div class=\"gpv\">GPV<\u002Fdiv>\n          <div class=\"gpv-sub\">Gross Payment Volume — how many dollars move through VYB.<\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"ns-line\">If VYB becomes the default operating system for live-entertainment payments, <b>GPV becomes the engine<\u002Fb> that drives transaction fees, financing products, analytics, and enterprise value.<\u002Fp>\n        <div class=\"ns-metrics\">\n          <div class=\"m\"><div class=\"mk\">ARR<\u002Fdiv><div class=\"ms\">Recurring software revenue<\u002Fdiv><\u002Fdiv>\n          <div class=\"m\"><div class=\"mk\">Active venues<\u002Fdiv><div class=\"ms\">Rooms operating on VYB<\u002Fdiv><\u002Fdiv>\n          <div class=\"m\"><div class=\"mk\">Active festivals<\u002Fdiv><div class=\"ms\">Events run through VYB<\u002Fdiv><\u002Fdiv>\n          <div class=\"m\"><div class=\"mk\">Active vendors<\u002Fdiv><div class=\"ms\">Suppliers paid via VYB<\u002Fdiv><\u002Fdiv>\n          <div class=\"m\"><div class=\"mk\">Active artists<\u002Fdiv><div class=\"ms\">Settled through VYB<\u002Fdiv><\u002Fdiv>\n          <div class=\"m\"><div class=\"mk\">Products originated<\u002Fdiv><div class=\"ms\">Financing volume issued<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footer-mark\"><span class=\"app-icon\">v<\u002Fspan> vyb<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- THE VISION -->\n  <section data-label=\"The vision\">\n    <div class=\"slide dark\">\n      <div class=\"vision-wrap\">\n        <span class=\"eyebrow\">The prize<\u002Fspan>\n        <h1>VYB isn't a music app.<br>It's the <em>financial infrastructure layer<\u002Fem><br>for live entertainment.<\u002Fh1>\n        <p style=\"font-size:24px;line-height:1.5;color:#c7c7cc;max-width:60ch;margin-top:26px;\">Can VYB run a $500M+ tour's settlements, vendor payouts, merch revenue &amp; venue reconciliation? If yes, that's a far larger company than a traditional PayFac.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"foot-tag\">VYB · FINANCIAL OS<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 15 · CLOSING -->\n  <section data-label=\"Closing\">\n    <div class=\"slide dark\">\n      <div class=\"close-wrap\">\n        <h1>Every booking,<br><em>one tap.<\u002Fem><\u002Fh1>\n        <p class=\"sub\">VYB is rolling out to touring teams now. Music industry infrastructure, built native for iPhone.<\u002Fp>\n        <div class=\"close-cta\"><span class=\"app-icon\" style=\"width:42px;height:42px;border-radius:10px;font-size:24px;\">v<\u002Fspan> Get early access<\u002Fdiv>\n        <p class=\"close-meta\">iPhone only · iOS 17+ · Invite code required<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"foot-tag\">vyb.app<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n\n<script src=\"dc950efc-437d-4f7e-ab99-2af1f7a922f8\"><\u002Fscript>\n<script src=\"7f9fccf6-4903-4aaa-bdb0-4393992d6e65\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
