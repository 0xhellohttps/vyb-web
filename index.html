    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.

 letter-spacing: .08em; text-transform: uppercase; color: var(--accent); }\n.float-card .fc-h { font-size: 14px; font-weight: 650; color: var(--text-primary); margin: 5px 0 8px; line-height: 1.25; }\n.float-card .fc-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-secondary); padding: 3px 0; border-top: .5px solid var(--surface-border); }\n.float-card .fc-row b { color: var(--text-primary); font-weight: 600; }\n@media (max-width: 460px) { .float-card { display: none; } }\n\n/* ── SEE IT IN ACTION (typed demo) ─────────────────────── */\n.demo-window {\n  margin-top: 28px; max-width: 760px;\n  border: 1px solid var(--surface-border); border-radius: 14px; overflow: hidden;\n  background: var(--card-bg); backdrop-filter: blur(20px);\n  box-shadow: var(--shadow-screenshot);\n}\n.demo-bar { display: flex; align-items: center; gap: 7px; padding: 11px 14px; border-bottom: 1px solid var(--surface-border); }\n.demo-bar i { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }\n.demo-bar .r { background: #ff5f57; } .demo-bar .y { background: #febc2e; } .demo-bar .g { background: #28c840; }\n.demo-bar span { margin-left: 8px; font-size: 11px; color: var(--text-tertiary); letter-spacing: .02em; }\n.demo-body { padding: 24px 24px 28px; font-size: 17px; line-height: 1.75; min-height: 210px; }\n.demo-ctx { color: var(--text-tertiary); }\n.demo-trigger-line { margin-top: 6px; }\n.demo-prompt { color: var(--accent); }\n.demo-trigger { color: var(--text-primary); }\n.demo-cursor { display: inline-block; width: 8px; height: 1.05em; background: var(--accent); vertical-align: text-bottom; margin-left: 1px; animation: blink 1s step-start infinite; }\n.demo-out { margin-top: 14px; padding-left: 14px; border-left: 2px solid var(--accent); color: var(--text-primary); white-space: pre-wrap; }\n.demo-tag { display: inline-block; font-size: 10px; font-weight: 600; font-family: var(--system); color: #fff; background: var(--accent); paddin : 100%; height: 100%; overflow: visible; }\n.fd-ring { fill: none; stroke: var(--surface-border); stroke-width: 1.5; }\n.fd-track { fill: none; stroke: var(--accent); stroke-width: 2; stroke-linecap: round; stroke-dasharray: 60 1636; opacity: .9; animation: fdOrbit 9s linear infinite; }\n@keyframes fdOrbit { to { stroke-dashoffset: -1696; } }\n.fd-spoke { stroke: var(--surface-border); stroke-width: 1.5; stroke-dasharray: 3 5; }\n.fd-pulse { fill: var(--accent); }\n\n.fd-node {\n  position: absolute; transform: translate(-50%, -50%);\n  width: 156px; display: flex; flex-direction: column; align-items: center; gap: 7px;\n  text-align: center;\n}\n.fd-badge {\n  width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;\n  display: flex; align-items: center; justify-content: center;\n  background: var(--bg); border: 1.5px solid var(--accent); color: var(--accent);\n  font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums;\n  box-shadow: 0 0 0 5px var(--bg); position: relative; z-index: 2;\n  transition: transform .25s, background .25s, color .25s;\n}\n.fd-node:hover .fd-badge { background: var(--accent); color: #fff; transform: scale(1.08); }\n.fd-name { font-size: 13px; font-weight: 600; color: var(--text-primary); line-height: 1.3; letter-spacing: -0.01em; }\n.fd-sub { font-size: 11px; color: var(--text-secondary); line-height: 1.35; }\n\n.fd-hub {\n  position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);\n  width: 132px; height: 132px; border-radius: 50%; z-index: 3;\n  background: var(--vyb-grad); color: #fff;\n  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;\n  box-shadow: 0 18px 50px -16px rgba(0,113,227,.6), inset 0 0 0 1px rgba(255,255,255,.2), 0 0 0 8px var(--bg);\n}\n.fd-hub .hub-mark { font-family: var(--system); font-size: 34px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; }\n.fd-hub .hub-sub { font-size: 9px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; opacity: .85; }\n\n@media (max-width: 600px) {\n  .flow-diagram { max-width: 440px; }\n  .fd-node { width: 104px; }\n  .fd-name { font-size: 11px; }\n  .fd-sub { display: none; }\n  .fd-badge { width: 34px; height: 34px; font-size: 13px; }\n  .fd-hub { width: 96px; height: 96px; }\n  .fd-hub .hub-mark { font-size: 26px; }\n}\n@media (prefers-reduced-motion: reduce) { .fd-track { animation: none; } .fd-pulse { display: none; } }\n\n/* ── FOOTER ────────────────────────────────────────────── */\nfooter { border-top: 1px solid var(--nav-border); padding: 48px 32px; transition: background .4s, border-color .4s; }\n.footer-inner { max-width: 1080px; display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 40px; }\n.footer-brand { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 600; letter-spacing: -0.3px; color: var(--text-primary); }\n.footer-brand .app-icon { width: 34px; height: 34px; border-radius: 8px; font-size: 19px; }\n.footer-meta { font-size: 14px; color: var(--text-tertiary); margin-top: 10px; }\n.footer-links { display: flex; gap: 24px; align-items: center; }\n.footer-links a { font-size: 14px; color: var(--text-tertiary); transition: color .2s; }\n.footer-links a:hover { color: var(--accent); }\n@media (max-width: 760px) { .footer-inner { flex-direction: column; align-items: flex-start; } }\n\n/* ── ANIMATIONS ────────────────────────────────────────── */\n@keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }\n.fade-up { opacity: 0; animation: fadeUp .7s cubic-bezier(.22,1,.36,1) forwards; }\n.fade-up-1 { animation-delay: .05s; }\n.fade-up-2 { animation-delay: .15s; }\n.fade-up-3 { animation-delay: .28s; }\n.fade-up-4 { animation-delay: .42s; }\n.fade-up-5 { animation-delay: .56s; }\n[data-io] { opacity: 0; transform: translateY(28px); transition: opacity .6s cubic-bezier(.22,1,.36,1), transform .6s cubic-bezier(.22,1,.36,1); }\n[data-io].in { opacity: 1; transform: none; }\n@media (prefers-reduced-motion: reduce) {\n  .fade-up, [data-io] { opacity: 1 !important; transform: none !important; animation: none !important; }\n  .hero-cursor, .demo-cursor { animation: none; }\n  html { scroll-behavior: auto; }\n}\n\n\n\u002F* THE ENGINE — ported from pitch slide 12 *\u002F\n#engine .engine-flow { max-width: 760px; margin-top: 44px; }\n#engine .ef-chips { display: flex; flex-wrap: wrap; gap: 10px; }\n#engine .ef-chip { font: 600 14px\u002F1.2 var(--mono); color: var(--pill-text); background: var(--pill-bg); border-radius: 999px; padding: 10px 15px; letter-spacing: .2px; }\n#engine .ef-arrow { color: var(--text-tertiary); font-size: 22px; line-height: 1; margin: 14px 0; padding-left: 4px; }\n#engine .ef-bar { border: 1px solid var(--card-border); background: var(--card-bg); border-radius: 16px; padding: 20px 22px; }\n#engine .ef-bar.ledger { border-color: var(--accent); }\n#engine .ef-bar-t { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 5px; }\n#engine .ef-bar-s { font-size: 16px; color: var(--text-secondary); line-height: 1.55; }\n#engine .ef-cap { font: 600 13px\u002F1 var(--mono); text-transform: uppercase; letter-spacing: .8px; color: var(--text-tertiary); margin: 16px 0 12px; padding-left: 4px; }\n#engine .ef-trio { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }\n#engine .ef-agent { border: 1px solid var(--card-border); background: var(--card-bg); border-radius: 16px; padding: 18px; }\n#engine .ef-agent .ak { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }\n#engine .ef-agent .ad { font-size: 15px; color: var(--text-secondary); line-height: 1.5; }\n@media (max-width: 760px) { #engine .ef-trio { grid-template-columns: 1fr; } }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- NAV -->\n<nav>\n  <a href=\"#hero\" class=\"nav-logo\">\n    <span class=\"app-icon\">v<\u002Fspan>\n    vyb\n  <\u002Fa>\n  <div class=\"nav-right\">\n    <a href=\"#features\" class=\"nav-link\">Features<\u002Fa>\n    <a href=\"#how-it-works\" class=\"nav-link\">How it works<\u002Fa>\n    <a href=\"#enterprise\" class=\"nav-link\">Enterprise<\u002Fa>\n    <a href=\"#who\" class=\"nav-link\">Who VYBs<\u002Fa>\n    <a href=\"#get\" class=\"nav-buy-btn\">Get early access<\u002Fa>\n    <button class=\"theme-toggle\" id=\"themeToggle\" aria-label=\"Toggle dark mode\">\n      <span class=\"tt-icon tt-sun\">☀️<\u002Fspan>\n      <span class=\"tt-icon tt-moon\">🌙<\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- HERO -->\n<section class=\"hero\" id=\"hero\">\n  <div class=\"hero-content\">\n    <h1 class=\"hero-title fade-up fade-up-1\">Music Industry Infra and Artist OS.<br>Welcome to the modern musician's full stack.<span class=\"hero-cursor\"><\u002Fspan><\u002Fh1>\n    <p class=\"hero-subtitle fade-up fade-up-3\">VYB lives in your group chat, turning short messages into booked shows — with an AI Concierge that confirms bookings, syncs schedules, and settles money in every thread.<\u002Fp>\n    <div class=\"hero-actions fade-up fade-up-4\">\n      <a href=\"#get\" class=\"download-btn\">\n        <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" fill=\"none\"><path d=\"M5 10h10m0 0l-4-4m4 4l-4 4\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        Get early access\n      <\u002Fa>\n    <\u002Fdiv>\n    <p class=\"hero-note fade-up fade-up-5\">Free during early access · iPhone only · No subscription<\u002Fp>\n    <p class=\"hero-note fade-up fade-up-5\">Requires iOS 17 or later<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"hero-visual fade-up fade-up-5\">\n    <div class=\"phone\">\n      <div class=\"phone-screen\">\n        <div class=\"notch\"><\u002Fdiv>\n        <div class=\"imsg\">\n          <div class=\"imsg-status\">\n            <span>9:41<\u002Fspan>\n            <span class=\"dots\">\n              <svg width=\"17\" height=\"11\" viewBox=\"0 0 17 11\" fill=\"#1c1c1e\"><rect x=\"0\" y=\"7\" width=\"3\" height=\"4\" rx=\"1\"><\u002Frect><rect x=\"4.5\" y=\"5\" width=\"3\" height=\"6\" rx=\"1\"><\u002Frect><rect x=\"9\" y=\"2.5\" width=\"3\" height=\"8.5\" rx=\"1\"><\u002Frect><rect x=\"13.5\" y=\"0\" width=\"3\" height=\"11\" rx=\"1\"><\u002Frect><\u002Fsvg>\n              <svg width=\"22\" height=\"11\" viewBox=\"0 0 25 12\" fill=\"none\"><rect x=\"0.5\" y=\"0.5\" width=\"21\" height=\"11\" rx=\"3\" stroke=\"#1c1c1e\" opacity=\"0.4\"><\u002Frect><rect x=\"2\" y=\"2\" width=\"16\" height=\"8\" rx=\"1.5\" fill=\"#1c1c1e\"><\u002Frect><rect x=\"23\" y=\"3.5\" width=\"1.5\" height=\"5\" rx=\"0.75\" fill=\"#1c1c1e\" opacity=\"0.4\"><\u002Frect><\u002Fsvg>\n            <\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"imsg-head\">\n            <div class=\"imsg-avatar\">v<\u002Fdiv>\n            <div class=\"imsg-title\">Midwest Run · Tour Group<\u002Fdiv>\n            <div class=\"imsg-sub\">You, Mara, Dev, @vyb · 4 people<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"imsg-body\">\n            <div class=\"imsg-day\">Today 9:38 AM<\u002Fdiv>\n            <div class=\"bub-name\">Mara · Manager<\u002Fdiv>\n            <div class=\"bub bub-in\">@vyb the Chicago promoter bumped their offer to $4,200 — can we take it?<\u002Fdiv>\n            <div class=\"prop\">\n              <div class=\"prop-top\">\n                <div class=\"prop-mark\">v<\u002Fdiv>\n                <div>\n                  <div class=\"prop-kicker\">Booking · needs confirm<\u002Fdiv>\n                  <div class=\"prop-h\">Metro Chicago · Fri Oct 17<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"prop-rows\">\n                <div class=\"prop-row\"><span>Guarantee<\u002Fspan><b>$4,200<\u002Fb><\u002Fdiv>\n                <div class=\"prop-row\"><span>Deposit<\u002Fspan><b>$1,260 · 30%<\u002Fb><\u002Fdiv>\n                <div class=\"prop-row\"><span>Routing<\u002Fspan><b>+38 mi · Milwaukee<\u002Fb><\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"prop-cta\">\n                <div class=\"prop-confirm\">\n                  <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>\n                  Confirm in app\n                <\u002Fdiv>\n                <div class=\"prop-later\">Hold<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"bub bub-out\">Confirmed ✓ on the calendar &amp; deposit queued.<\u002Fdiv>\n            <div class=\"imsg-input\">VYB is handling it…<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SEE IT IN ACTION -->\n<section id=\"action\">\n  <div class=\"section-inner\">\n    <p class=\"section-eyebrow\">In every thread, every time<\u002Fp>\n    <h2 class=\"section-title\">See it in action.<\u002Fh2>\n    <div class=\"demo-window\" id=\"demoWindow\">\n      <div class=\"demo-bar\"><i class=\"r\"><\u002Fi><i class=\"y\"><\u002Fi><i class=\"g\"><\u002Fi><span>Midwest Run · Tour Group<\u002Fspan><\u002Fdiv>\n      <div class=\"demo-body\">\n        <div class=\"demo-ctx\" id=\"demoCtx\"><\u002Fdiv>\n        <div class=\"demo-trigger-line\"><span class=\"demo-prompt\">@vyb&nbsp;<\u002Fspan><span class=\"demo-trigger\" id=\"demoTrigger\"><\u002Fspan><span class=\"demo-cursor\" id=\"demoCursor\"><\u002Fspan><\u002Fdiv>\n        <div class=\"demo-out\" id=\"demoOut\" style=\"display:none;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- LIVES IN YOUR GROUP CHAT -->\n<section id=\"demo\">\n  <div class=\"section-inner\">\n    <p class=\"section-eyebrow\">Always there<\u002Fp>\n    <h2 class=\"section-title\">Lives in your group chat.<\u002Fh2>\n    <p class=\"section-subtitle\">Drop the VYB number into your tour thread. One message to confirm a booking, move the schedule, or settle a show — and it gets out of the way the rest of the time.<\u002Fp>\n    <p class=\"section-subtitle\" style=\"margin-top:18px;color:var(--hero-text);font-weight:500;\">Every tap is a transaction — and every transaction settles itself.<\u002Fp>\n\n    <div class=\"chat-stage\" data-io=\"\">\n      <div class=\"phone\">\n        <div class=\"phone-screen\">\n          <div class=\"notch\"><\u002Fdiv>\n          <div class=\"imsg\">\n            <div class=\"imsg-status\">\n              <span>9:41<\u002Fspan>\n              <span class=\"dots\">\n                <svg width=\"17\" height=\"11\" viewBox=\"0 0 17 11\" fill=\"#1c1c1e\"><rect x=\"0\" y=\"7\" width=\"3\" height=\"4\" rx=\"1\"><\u002Frect><rect x=\"4.5\" y=\"5\" width=\"3\" height=\"6\" rx=\"1\"><\u002Frect><rect x=\"9\" y=\"2.5\" width=\"3\" height=\"8.5\" rx=\"1\"><\u002Frect><rect x=\"13.5\" y=\"0\" width=\"3\" height=\"11\" rx=\"1\"><\u002Frect><\u002Fsvg>\n                <svg width=\"22\" height=\"11\" viewBox=\"0 0 25 12\" fill=\"none\"><rect x=\"0.5\" y=\"0.5\" width=\"21\" height=\"11\" rx=\"3\" stroke=\"#1c1c1e\" opacity=\"0.4\"><\u002Frect><rect x=\"2\" y=\"2\" width=\"16\" height=\"8\" rx=\"1.5\" fill=\"#1c1c1e\"><\u002Frect><rect x=\"23\" y=\"3.5\" width=\"1.5\" height=\"5\" rx=\"0.75\" fill=\"#1c1c1e\" opacity=\"0.4\"><\u002Frect><\u002Fsvg>\n              <\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"imsg-head\">\n              <div class=\"imsg-avatar\">v<\u002Fdiv>\n              <div class=\"imsg-title\">Midwest Run · Tour Group<\u002Fdiv>\n              <div class=\"imsg-sub\">Concierge active · 4 people<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"imsg-body\">\n              <div class=\"imsg-day\">Today 8:02 AM<\u002Fdiv>\n              <div class=\"bub-name\">Dev · Tour Manager<\u002Fdiv>\n              <div class=\"bub bub-in\">van's making bad noises, can we push lobby call to 11?<\u002Fdiv>\n              <div class=\"prop\">\n                <div class=\"prop-top\">\n                  <div class=\"prop-mark\">v<\u002Fdiv>\n                  <div>\n                    <div class=\"prop-kicker\">Schedule · auto-applied<\u002Fdiv>\n                    <div class=\"prop-h\">Lobby call → 11:00 AM<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"prop-rows\">\n                  <div class=\"prop-row\"><span>Affects<\u002Fspan><b>6 crew · 1 van<\u002Fb><\u002Fdiv>\n                  <div class=\"prop-row\"><span>Calendars<\u002Fspan><b>Updated<\u002Fb><\u002Fdiv>\n                  <div class=\"prop-row\"><span>Revert window<\u002Fspan><b>24 hours<\u002Fb><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"bub bub-out\">Done — everyone's calendar moved. I'll watch the soundcheck buffer.<\u002Fdiv>\n              <div class=\"imsg-input\">iMessage<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FEATURES -->\n<section id=\"features\">\n  <div class=\"section-inner\">\n    <p class=\"section-eyebrow\">Features<\u002Fp>\n    <h2 class=\"section-title\">Purpose-built.<br>No overhead.<\u002Fh2>\n    <p class=\"section-subtitle\">Small, fast, and out of the way. The Concierge proposes the move; you tap to confirm. Nothing money-related happens behind your back.<\u002Fp>\n\n    <div class=\"features-grid\">\n      <div class=\"feature-card\" data-io=\"\">\n        <span class=\"feature-icon\">@<\u002Fspan>\n        <h3 class=\"feature-title\">iMessage Concierge<\u002Fh3>\n        <p class=\"feature-body\">Tag <b>@vyb<\u002Fb> in the thread, or let it passively catch booking and schedule signals, and it replies with a proposal card.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feature-card\" data-io=\"\">\n        <span class=\"feature-icon\">✓<\u002Fspan>\n        <h3 class=\"feature-title\">Tap-to-confirm money<\u002Fh3>\n        <p class=\"feature-body\">Every payment needs one explicit tap in the app. The Concierge can propose, but the confirm tap is the legal record.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feature-card\" data-io=\"\">\n        <span class=\"feature-icon\">▭<\u002Fspan>\n        <h3 class=\"feature-title\">The VYB Card<\u002Fh3>\n        <p class=\"feature-body\">Issue virtual team cards, set per-person spend caps, and push them straight into Apple Wallet for the road.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feature-card\" data-io=\"\">\n        <span class=\"feature-icon\">⇅<\u002Fspan>\n        <h3 class=\"feature-title\">Live calendar sync<\u002Fh3>\n        <p class=\"feature-body\">A schedule change in the chat writes straight to everyone's calendar — with a 24-hour revert window, just in case.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feature-card\" data-io=\"\">\n        <span class=\"feature-icon\">≡<\u002Fspan>\n        <h3 class=\"feature-title\">Bidding queue<\u002Fh3>\n        <p class=\"feature-body\">Holds, formal offers and routing math in one place. Accept a bid and the deposit flow kicks off automatically.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feature-card\" data-io=\"\">\n        <span class=\"feature-icon\">¶<\u002Fspan>\n        <h3 class=\"feature-title\">VYB Talk briefs<\u002Fh3>\n        <p class=\"feature-body\">A persona-scoped synthesis of the entire tour chat — so everyone gets the version of \"what's happening\" that's theirs.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feature-card\" data-io=\"\">\n        <span class=\"feature-icon\">◎<\u002Fspan>\n        <h3 class=\"feature-title\">Live map<\u002Fh3>\n        <p class=\"feature-body\">Crew, flights and venues on one moving map — with location scope that defaults to the people who need it.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feature-card\" data-io=\"\">\n        <span class=\"feature-icon\">♪<\u002Fspan>\n        <h3 class=\"feature-title\">VYB Listen<\u002Fh3>\n        <p class=\"feature-body\">Share mixes with linear version control and time-coded comments on the playhead. Grant listen, edit, or none.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feature-card\" data-io=\"\">\n        <span class=\"feature-icon\">★<\u002Fspan>\n        <h3 class=\"feature-title\">Venue trust scores<\u002Fh3>\n        <p class=\"feature-body\">Honest, attributed-safe ratings on every room — so the team knows what they're walking into before load-in.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feature-card\" data-io=\"\">\n        <span class=\"feature-icon\">▤<\u002Fspan>\n        <h3 class=\"feature-title\">Studio management<\u002Fh3>\n        <p class=\"feature-body\">Book rooms, track sessions, and keep musicians, engineers, and gear organized — every session lands on the schedule.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feature-card\" data-io=\"\">\n        <span class=\"feature-icon\">⇪<\u002Fspan>\n        <h3 class=\"feature-title\">File sharing<\u002Fh3>\n        <p class=\"feature-body\">Send stems, sessions, and assets to the right people in seconds — with per-person <b>listen, edit, or none<\u002Fb> permissions.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feature-card\" data-io=\"\">\n        <span class=\"feature-icon\">⑂<\u002Fspan>\n        <h3 class=\"feature-title\">Bounce version control<\u002Fh3>\n        <p class=\"feature-body\">Every bounce is a tracked version on a linear timeline — compare takes, roll back, and never lose the one that worked.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feature-card\" data-io=\"\">\n        <span class=\"feature-icon\">▶<\u002Fspan>\n        <h3 class=\"feature-title\">Playback<\u002Fh3>\n        <p class=\"feature-body\">Stream any version in-app with time-coded comments dropped right on the playhead — feedback that points to the exact moment.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- HOW IT WORKS -->\n<section id=\"how-it-works\">\n  <div class=\"section-inner\">\n    <p class=\"section-eyebrow\">How it works<\u002Fp>\n    <h2 class=\"section-title\">Set up in four steps.<\u002Fh2>\n    <p class=\"section-subtitle\">Four steps and the Concierge is running your tour — no migration, no new app for the team to learn.<\u002Fp>\n\n    <div class=\"steps\">\n      <div class=\"step\" data-io=\"\">\n        <div class=\"step-number\">01<\u002Fdiv>\n        <h3 class=\"step-title\">Add the number<\u002Fh3>\n        <p class=\"step-body\">Drop the VYB number into your tour's iMessage group, the same way you'd add any teammate.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\" data-io=\"\">\n        <div class=\"step-number\">02<\u002Fdiv>\n        <h3 class=\"step-title\">Tag the Concierge<\u002Fh3>\n        <p class=\"step-body\">Ask for what you need, or just keep talking — VYB catches booking and schedule signals.<br><span class=\"step-code\">@vyb<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\" data-io=\"\">\n        <div class=\"step-number\">03<\u002Fdiv>\n        <h3 class=\"step-title\">Review the card<\u002Fh3>\n        <p class=\"step-body\">VYB replies in-thread with a clear proposal: the booking, the change, the cost — laid out to review.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\" data-io=\"\">\n        <div class=\"step-number\">04<\u002Fdiv>\n        <h3 class=\"step-title\">Confirm anywhere<\u002Fh3>\n        <p class=\"step-body\">One tap in iMessage or the app. The whole tour updates live.<br><span class=\"step-code\">tap to confirm<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SYNC / CARD -->\n<section id=\"sync\">\n  <div class=\"section-inner\">\n    <p class=\"section-eyebrow\">Sync &amp; the Card<\u002Fp>\n    <h2 class=\"section-title\">Your tour,<br>everywhere.<\u002Fh2>\n    <p class=\"section-subtitle\" style=\"margin-bottom: 8px;\">Every confirmation syncs to the schedule, the calendar, and the VYB Card in under half a second — across every device on the tour.<\u002Fp>\n    <div class=\"showcase\" data-io=\"\">\n      <div class=\"vcard\">\n        <div class=\"vcard-top\">\n          <span class=\"vcard-wm\">vyb<\u002Fspan>\n          <span class=\"vcard-chip\"><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"vcard-num\">4242&nbsp;&nbsp;7741&nbsp;&nbsp;0098&nbsp;&nbsp;2210<\u002Fdiv>\n        <div class=\"vcard-bottom\">\n          <div><div class=\"lbl\">Cardholder<\u002Fdiv><div class=\"val\">D. OKAFOR · TOUR MGR<\u002Fdiv><\u002Fdiv>\n          <div style=\"text-align:right;\"><div class=\"lbl\">Cap / day<\u002Fdiv><div class=\"val\">$600<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- VYB FOR ENTERPRISE -->\n<section id=\"enterprise\">\n  <div class=\"section-inner\">\n    <p class=\"section-eyebrow\">VYB for Enterprise<\u002Fp>\n    <h2 class=\"section-title\">Infrastructure for promoters,<br>agencies, and venue groups.<\u002Fh2>\n    <p class=\"section-subtitle\">When you're running hundreds of events a year, the margin lives in operations. VYB is built so faster settlement, zero chargebacks, and live reputation data make every event go smoothly — at any scale.<\u002Fp>\n\n    <div class=\"ent-grid\">\n      <div class=\"ent-card\" data-io=\"\">\n        <div class=\"ent-stat\">T+1<span class=\"unit\">→ instant<\u002Fspan><\u002Fdiv>\n        <div class=\"ent-label\">Faster settlement<\u002Fdiv>\n        <p class=\"ent-body\">Guarantees, deposits, and night-of splits settle the moment a show is confirmed — not days later. <b>Funds move on confirmation<\u002Fb>, with every transaction tagged to an event, a person, and a contract.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"ent-card\" data-io=\"\">\n        <div class=\"ent-stat\">0<span class=\"unit\">chargebacks<\u002Fspan><\u002Fdiv>\n        <div class=\"ent-label\">Zero chargebacks<\u002Fdiv>\n        <p class=\"ent-body\">Every payment is authorized by an explicit in-app tap that becomes the signed record. There's no disputed \"who agreed to what\" — <b>the confirmation is the contract<\u002Fb>, so disputes and reversals fall away.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"ent-card\" data-io=\"\">\n        <div class=\"ent-stat\">4.6<span class=\"unit\">/ 5 avg<\u002Fspan><\u002Fdiv>\n        <div class=\"ent-label\">Reputation management<\u002Fdiv>\n        <p class=\"ent-body\">Attributed-safe trust scores on every venue, promoter, and artist surface the risk before load-in. <b>Reputation travels with the network<\u002Fb>, so the right rooms book the right acts and nights run clean.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p class=\"ent-foot\" data-io=\"\">Centralized billing, role-based permissions across every persona, and an audit trail on every confirmation — <b>VYB gives operations teams a single source of truth<\u002Fb> that scales from a club night to a national run.<\u002Fp>\n\n    <p class=\"ent-flow-head\" data-io=\"\">A to Z, connected<\u002Fp>\n    <h3 class=\"ent-flow-title\" data-io=\"\">From the first invoice to the final settlement, VYB makes sure you never miss a beat.<\u002Fh3>\n\n    <div class=\"flow-diagram\" data-io=\"\">\n      <svg viewBox=\"0 0 760 760\" aria-hidden=\"true\">\n        <!-- spokes -->\n        <line class=\"fd-spoke\" x1=\"380\" y1=\"380\" x2=\"380\" y2=\"110\"><\u002Fline>\n        <line class=\"fd-spoke\" x1=\"380\" y1=\"380\" x2=\"613.8\" y2=\"245\"><\u002Fline>\n        <line class=\"fd-spoke\" x1=\"380\" y1=\"380\" x2=\"613.8\" y2=\"515\"><\u002Fline>\n        <line class=\"fd-spoke\" x1=\"380\" y1=\"380\" x2=\"380\" y2=\"650\"><\u002Fline>\n        <line class=\"fd-spoke\" x1=\"380\" y1=\"380\" x2=\"146.2\" y2=\"515\"><\u002Fline>\n        <line class=\"fd-spoke\" x1=\"380\" y1=\"380\" x2=\"146.2\" y2=\"245\"><\u002Fline>\n        <!-- ring -->\n        <circle class=\"fd-ring\" cx=\"380\" cy=\"380\" r=\"270\"><\u002Fcircle>\n        <path class=\"fd-track\" d=\"M 380 110 A 270 270 0 0 1 380 650 A 270 270 0 0 1 380 110\"><\u002Fpath>\n        <!-- travelling pulse -->\n        <circle class=\"fd-pulse\" r=\"6\">\n          <animateMotion dur=\"9s\" repeatCount=\"indefinite\" rotate=\"auto\" path=\"M 380 110 A 270 270 0 0 1 380 650 A 270 270 0 0 1 380 110\"><\u002FanimateMotion>\n        <\u002Fcircle>\n      <\u002Fsvg>\n\n      <div class=\"fd-hub\">\n        <span class=\"hub-mark\">vyb<\u002Fspan>\n        <span class=\"hub-sub\">Ops engine<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"fd-node\" style=\"left:50%; top:14.5%;\">\n        <div class=\"fd-badge\">1<\u002Fdiv>\n        <div class=\"fd-name\">Accounts payable<\u002Fdiv>\n        <div class=\"fd-sub\">Invoices captured &amp; queued<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fd-node\" style=\"left:80.8%; top:32.2%;\">\n        <div class=\"fd-badge\">2<\u002Fdiv>\n        <div class=\"fd-name\">Vendor onboarding<\u002Fdiv>\n        <div class=\"fd-sub\">W-9s, banking, compliance<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fd-node\" style=\"left:80.8%; top:67.8%;\">\n        <div class=\"fd-badge\">3<\u002Fdiv>\n        <div class=\"fd-name\">Tax reporting<\u002Fdiv>\n        <div class=\"fd-sub\">1099s filed automatically<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fd-node\" style=\"left:50%; top:85.5%;\">\n        <div class=\"fd-badge\">4<\u002Fdiv>\n        <div class=\"fd-name\">Contractor payouts<\u002Fdiv>\n        <div class=\"fd-sub\">Paid on confirmation<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fd-node\" style=\"left:19.2%; top:67.8%;\">\n        <div class=\"fd-badge\">5<\u002Fdiv>\n        <div class=\"fd-name\">Artist settlements<\u002Fdiv>\n        <div class=\"fd-sub\">Splits reconciled night-of<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"fd-node\" style=\"left:19.2%; top:32.2%;\">\n        <div class=\"fd-badge\">6<\u002Fdiv>\n        <div class=\"fd-name\">Multi-entity accounting<\u002Fdiv>\n        <div class=\"fd-sub\">One ledger per entity<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ent-flow\" data-io=\"\">\n      <div class=\"flow-item\">\n        <span class=\"flow-step\">01<\u002Fspan>\n        <div>\n          <div class=\"flow-name\">Accounts payable automation<\u002Fdiv>\n          <div class=\"flow-desc\">Invoices captured, matched, and queued for one-tap approval — no manual entry.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"flow-item\">\n        <span class=\"flow-step\">02<\u002Fspan>\n        <div>\n          <div class=\"flow-name\">Vendor onboarding<\u002Fdiv>\n          <div class=\"flow-desc\">Collect W-9s, banking, and compliance docs the moment a vendor joins the network.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"flow-item\">\n        <span class=\"flow-step\">03<\u002Fspan>\n        <div>\n          <div class=\"flow-name\">Tax reporting (1099s)<\u002Fdiv>\n          <div class=\"flow-desc\">Year-end 1099s generated and filed automatically from the payouts already on record.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"flow-item\">\n        <span class=\"flow-step\">04<\u002Fspan>\n        <div>\n          <div class=\"flow-name\">Contractor payouts<\u002Fdiv>\n          <div class=\"flow-desc\">Crew, techs, and freelancers paid on confirmation — to the account they chose.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"flow-item\">\n        <span class=\"flow-step\">05<\u002Fspan>\n        <div>\n          <div class=\"flow-name\">Artist settlements<\u002Fdiv>\n          <div class=\"flow-desc\">Night-of splits reconciled against the deal and settled the moment the show wraps.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"flow-item\">\n        <span class=\"flow-step\">06<\u002Fspan>\n        <div>\n          <div class=\"flow-name\">Multi-entity accounting<\u002Fdiv>\n          <div class=\"flow-desc\">Every entity, tour, and room kept on its own ledger — rolled up into one clean view.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WHO VYBS WELL -->\n<section id=\"who\">\n  <div class=\"section-inner\">\n    <p class=\"section-eyebrow\">Who VYBs Well<\u002Fp>\n    <h2 class=\"section-title\">Built for the rooms<br>that run live events.<\u002Fh2>\n    <p class=\"section-subtitle\">Wherever events get booked, settled, and run at volume, VYB keeps the whole operation on the beat.<\u002Fp>\n\n    <div class=\"steps\">\n      <div class=\"step\" data-io=\"\">\n        <div class=\"step-number\">01<\u002Fdiv>\n        <h3 class=\"step-title\">Hotels<\u002Fh3>\n        <p class=\"step-body\">Program residencies, lobby sets, and in-house events across every property — all on one schedule and ledger.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\" data-io=\"\">\n        <div class=\"step-number\">02<\u002Fdiv>\n        <h3 class=\"step-title\">Hospitality groups<\u002Fh3>\n        <p class=\"step-body\">Coordinate talent and entertainment programming across a portfolio of venues from a single source of truth.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\" data-io=\"\">\n        <div class=\"step-number\">03<\u002Fdiv>\n        <h3 class=\"step-title\">Stadiums<\u002Fh3>\n        <p class=\"step-body\">Run high-stakes settlements and vendor payouts at arena scale, with an audit trail on every confirmation.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\" data-io=\"\">\n        <div class=\"step-number\">04<\u002Fdiv>\n        <h3 class=\"step-title\">Large-scale venues<\u002Fh3>\n        <p class=\"step-body\">Manage holds, offers, and routing for a packed calendar — the Concierge keeps every date moving.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\" data-io=\"\">\n        <div class=\"step-number\">05<\u002Fdiv>\n        <h3 class=\"step-title\">Restaurants<\u002Fh3>\n        <p class=\"step-body\">Book talent for dinner service and private events, settle the night, and pay vendors on confirmation.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\" data-io=\"\">\n        <div class=\"step-number\">06<\u002Fdiv>\n        <h3 class=\"step-title\">Clubs<\u002Fh3>\n        <p class=\"step-body\">Lock DJs and artists, handle deposits and night-of splits, and track venue reputation across the network.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\" data-io=\"\">\n        <div class=\"step-number\">07<\u002Fdiv>\n        <h3 class=\"step-title\">Booking agents<\u002Fh3>\n        <p class=\"step-body\">Work the hold queue, routing math, and offers across a whole roster — every deal settled and tracked end to end.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- THE ENGINE (from pitch slide 12) -->\n<section id=\"engine\">\n  <div class=\"section-inner\">\n    <p class=\"section-eyebrow\">The Engine<\u002Fp>\n    <h2 class=\"section-title\">An autonomous reconciliation engine.<\u002Fh2>\n    <p class=\"section-subtitle\">Every dollar a live event generates runs through one ledger — captured the moment it lands, then matched, split, and settled automatically.<\u002Fp>\n\n    <div class=\"engine-flow\">\n      <div class=\"ef-chips\">\n        <span class=\"ef-chip\">Tickets<\u002Fspan>\n        <span class=\"ef-chip\">Food &amp; beverage<\u002Fspan>\n        <span class=\"ef-chip\">Merch<\u002Fspan>\n        <span class=\"ef-chip\">Parking<\u002Fspan>\n        <span class=\"ef-chip\">VIP<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"ef-arrow\">↓<\u002Fdiv>\n      <div class=\"ef-bar\">\n        <div class=\"ef-bar-t\">VYB Payment Bus<\u002Fdiv>\n        <div class=\"ef-bar-s\">Real-time event ledger — every dollar captured the moment it lands.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ef-arrow\">↓<\u002Fdiv>\n      <p class=\"ef-cap\">Agentic finance layer<\u002Fp>\n      <div class=\"ef-trio\">\n        <div class=\"ef-agent\"><div class=\"ak\">Settlement<\u002Fdiv><div class=\"ad\">Matches transactions, splits funds, pays vendors.<\u002Fdiv><\u002Fdiv>\n        <div class=\"ef-agent\"><div class=\"ak\">Reconciliation<\u002Fdiv><div class=\"ad\">Detects missing transactions &amp; revenue leakage.<\u002Fdiv><\u002Fdiv>\n        <div class=\"ef-agent\"><div class=\"ak\">Compliance<\u002Fdiv><div class=\"ad\">AML \u002F KYC, tax rules, reporting &amp; audit trail.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ef-arrow\">↓<\u002Fdiv>\n      <div class=\"ef-bar ledger\">\n        <div class=\"ef-bar-t\">VYB Master Ledger<\u002Fdiv>\n        <div class=\"ef-bar-s\">Venue · Concessions · Artists · Sponsors — distributed automatically.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CTA -->\n<section id=\"get\">\n  <div class=\"section-inner\">\n    <p class=\"section-eyebrow\">Get VYB<\u002Fp>\n    <h2 class=\"section-title\">Every booking,<br>one tap.<\u002Fh2>\n    <p class=\"section-subtitle\" style=\"margin-bottom: 36px;\">Rolling out to touring teams now · Invite Code Required.<\u002Fp>\n    <a href=\"#get\" class=\"download-btn\">\n      <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\" fill=\"none\"><path d=\"M5 10h10m0 0l-4-4m4 4l-4 4\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n      Get early access\n    <\u002Fa>\n    <p style=\"margin-top:16px; font-size:17px; font-weight:500; color:var(--text-secondary);\">Free during early access · iPhone only · No subscription<\u002Fp>\n    <p style=\"margin-top:8px; font-size:15px; color:var(--text-tertiary);\
